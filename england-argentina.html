<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Combined XI: England vs Argentina | Pick your World Cup 2026 dream team</title>
<meta name="description" content="Mix the best players from England and Argentina to build your ultimate Combined XI for the 2026 World Cup. Vote for every position!">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--card:#f5f5f5;--card-hover:#eaeaea;--card-selected-en:#dbeafe;--card-selected-ar:#d1fae5;
  --accent:#e30613;--accent-dark:#b8050f;--accent-light:#ff1a2a;
  --text:#1a1a1a;--text-muted:#777;
  --pitch-green:#2d6a30;--pitch-dark:#1e5420;--pitch-line:rgba(255,255,255,.35);
  --pos-gk:#1e88e5;--pos-def:#1a1a1a;--pos-mid:#f9a825;--pos-att:#c62828;
  --en-color:#1e3a8a;--en-bg:#dbeafe;--en-border:#3b82f6;
  --ar-color:#75aadb;--ar-bg:#d1fae5;--ar-border:#34d399;
  --done-bg:#d4edda;--done-text:#1e7e34;
  --radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.4}

#squad-widget{display:flex;gap:20px;width:100%;max-width:720px;margin:0 auto;padding:20px;align-items:flex-start}
.selector-panel{flex:1;min-width:0}
.pitch-panel{width:308px;flex-shrink:0;position:sticky;top:20px}

.widget-header{text-align:center;margin-bottom:16px}
.widget-header h1{font-size:1.05rem;font-weight:800;letter-spacing:.3px;line-height:1.3}
.widget-header h1 .en{color:var(--en-color)}
.widget-header h1 .ar{color:var(--ar-color)}
.widget-header h1 .x{color:var(--accent)}
.widget-header p{font-size:.75rem;color:var(--text-muted);margin-top:4px}

.formation-bar{margin-bottom:14px}
.formation-label{font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.formation-options{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.formation-btn{padding:6px;background:var(--card);border:2px solid transparent;border-radius:var(--radius);cursor:pointer;transition:all .2s;font-family:inherit;font-size:.78rem;font-weight:700;color:var(--text);letter-spacing:.2px;white-space:nowrap}
.formation-btn:hover:not(.active){background:var(--card-hover)}
.formation-btn.active{background:#fde8e8;border-color:var(--accent);color:var(--accent)}

.progress{display:flex;align-items:center;gap:12px;margin-bottom:14px;font-size:.95rem;color:var(--text-muted)}
.progress-bar{flex:1;height:12px;background:var(--card);border-radius:6px;overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--en-color),var(--accent),var(--ar-color));transition:width .3s}
.progress-text{font-weight:700;color:var(--text);white-space:nowrap;font-size:.95rem}
.progress-text .done{color:var(--accent)}

.place-hint{font-size:.68rem;color:var(--text-muted);font-style:italic;margin-bottom:12px;line-height:1.4}

.pos-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.pos-tab{padding:5px 8px;background:var(--card);border:2px solid transparent;border-radius:20px;cursor:pointer;transition:all .2s;font-family:inherit;font-size:.68rem;font-weight:700;color:var(--text-muted);letter-spacing:.2px;white-space:nowrap;flex-shrink:0}
.pos-tab:hover:not(.active){background:var(--card-hover)}
.pos-tab.active{background:#fde8e8;border-color:var(--accent);color:var(--accent)}
.pos-tab .tab-badge{display:inline-block;min-width:14px;height:14px;line-height:14px;text-align:center;border-radius:7px;font-size:.55rem;font-weight:800;color:#fff;background:var(--accent);margin-left:3px;padding:0 3px}
.pos-tab .tab-badge.empty{background:#ccc}

.pos-panel{display:none}
.pos-panel.active{display:block}
.player-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.player-card{display:flex;align-items:center;gap:5px;background:var(--card);border:2px solid transparent;border-radius:var(--radius);padding:5px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-width:0}
.player-card:hover:not(.disabled){border-color:var(--accent);background:var(--card-hover)}
.player-card.selected.en{border-color:var(--en-border);background:var(--card-selected-en)}
.player-card.selected.ar{border-color:var(--ar-border);background:var(--card-selected-ar)}
.player-card.disabled{opacity:.35;pointer-events:none}
.player-card .avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(0,0,0,.12);flex-shrink:0;background-size:cover;background-position:center top;background-repeat:no-repeat;background-color:#dfe3e8}
.player-card .info{flex:1;min-width:0;overflow:hidden}
.player-card .name{font-size:.68rem;font-weight:600;line-height:1.25}
.player-card .name span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-card .name .first{font-weight:400;color:var(--text-muted);font-size:.64rem}
.player-card .check{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;color:#fff;display:none;align-items:center;justify-content:center;font-size:.55rem;font-weight:700}
.player-card.selected .check{display:flex}
.player-card.selected.en .check{background:var(--en-color)}
.player-card.selected.ar .check{background:var(--ar-color)}

.pitch-container{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.pitch-title{text-align:center;font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;line-height:1.4}
.pitch-title strong{display:block;color:var(--accent);font-size:.9rem;letter-spacing:2px;margin-top:2px}
.pitch{position:relative;width:100%;padding-bottom:150%;background:linear-gradient(180deg,var(--pitch-dark) 0%,var(--pitch-green) 22%,var(--pitch-green) 78%,var(--pitch-dark) 100%);border-radius:8px;overflow:hidden;border:2px solid var(--pitch-line)}
.pitch-lines{position:absolute;inset:0}
.pitch-lines .halfway{position:absolute;top:50%;left:5%;right:5%;height:0;border-top:2px solid var(--pitch-line)}
.pitch-lines .center-circle{position:absolute;top:50%;left:50%;width:22%;padding-bottom:22%;border-radius:50%;border:2px solid var(--pitch-line);transform:translate(-50%,-50%)}
.pitch-lines .center-dot{position:absolute;top:50%;left:50%;width:5px;height:5px;border-radius:50%;background:var(--pitch-line);transform:translate(-50%,-50%)}
.pitch-lines .box-top{position:absolute;top:0;left:22%;right:22%;height:14%;border:2px solid var(--pitch-line);border-top:none}
.pitch-lines .box-bottom{position:absolute;bottom:0;left:22%;right:22%;height:14%;border:2px solid var(--pitch-line);border-bottom:none}
.pitch-zones{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:4% 4%}
.pitch-zone{display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:8px;min-height:0;flex:1}
.pitch-zone.gk{flex:0 0 auto}
.pitch-zone.spread{justify-content:space-between;padding:0 4%}

.pitch-dot{display:flex;flex-direction:column;align-items:center;width:44px;transition:transform .2s;cursor:pointer}
.pitch-dot .dot-circle{width:42px;height:42px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff;letter-spacing:.3px;box-shadow:0 2px 6px rgba(0,0,0,.45)}
.pitch-dot .dot-name{font-size:.58rem;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);margin-top:2px;line-height:1.05;text-align:center;white-space:nowrap}
.pitch-dot.empty .dot-circle{border:2px dashed rgba(255,255,255,.45);background:rgba(255,255,255,.08)!important;color:rgba(255,255,255,.45)}
.pitch-dot.empty .dot-name{color:rgba(255,255,255,.4)}
.pitch-dot.empty.active .dot-circle{border:2px solid var(--accent-light);background:rgba(227,6,19,.25)!important;color:#fff;box-shadow:0 0 0 3px rgba(227,6,19,.5)}
.pitch-dot.empty.active .dot-name{color:var(--accent-light)}

.team-counter{display:flex;justify-content:center;gap:14px;margin-bottom:12px;font-size:.72rem;font-weight:700}
.team-counter .en-count{color:var(--en-color)}
.team-counter .ar-count{color:var(--ar-color)}
.team-counter span{display:flex;align-items:center;gap:4px}

.share-section{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.share-section.locked{opacity:.5;pointer-events:none}
.share-hint{text-align:center;font-size:.68rem;color:var(--text-muted);font-style:italic}
.share-hint.hidden{display:none}
.share-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.share-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 6px;border:none;border-radius:var(--radius);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;color:#fff;font-family:inherit}
.share-btn:hover{opacity:.9;transform:translateY(-1px)}
.share-btn.x{background:#000}
.share-btn.fb{background:#1877f2}
.share-btn.wa{background:#25d366}
.share-btn.ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.share-btn.dl{background:var(--accent);grid-column:1 / -1;padding:12px;font-size:.85rem}
.reset-btn{display:block;width:100%;margin-top:12px;padding:8px;background:transparent;color:var(--text-muted);border:1px solid #ccc;border-radius:var(--radius);font-size:.72rem;cursor:pointer;transition:all .2s;font-family:inherit}
.reset-btn:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:640px){
  #squad-widget{flex-direction:column;padding:10px;gap:14px}
  .pitch-panel{width:100%;position:static}
  .pitch-panel .pitch-container{max-width:360px;margin:0 auto}
  .pitch{padding-bottom:120%}
}
@media(max-width:400px){
  #squad-widget{padding:8px}
  .player-card{padding:4px;gap:4px}
  .player-card .avatar{width:26px;height:26px}
  .player-card .name{font-size:.64rem}
  .pos-tabs{gap:3px}
  .pos-tab{padding:4px 6px;font-size:.64rem}
}
</style>
</head>

<div id="squad-widget">

  <div class="selector-panel">

    <div class="widget-header">
      <h1><span class="en">England</span> <span class="x">✕</span> <span class="ar">Argentina</span> — Combined XI</h1>
      <p>Build the ultimate mixed XI from both squads</p>
    </div>

    <div class="formation-bar">
      <div class="formation-label">Formation</div>
      <div class="formation-options" id="formationOptions"></div>
    </div>

    <div class="progress">
      <div class="progress-text"><span class="done" id="totalSelected">0</span> / 11 starters</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="team-counter">
      <span class="en-count">🏴󠁧󠁢󠁥󠁮󠁧󠁿 <span id="countEn">0</span></span>
      <span class="ar-count">🇦🇷 <span id="countAr">0</span></span>
    </div>

    <div class="place-hint">Click a player to place them. You can click a slot on the pitch to choose where to position them.</div>

    <div class="pos-tabs" id="posTabs"></div>
    <div id="posPanels"></div>

    <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  </div>

  <div class="pitch-panel">
    <div class="pitch-container" id="pitchContainer">
      <div class="pitch-title"><span id="pitchTitleText">My Combined XI</span><strong id="pitchFormationLabel">4-3-3</strong></div>
      <div class="pitch" id="pitch">
        <div class="pitch-lines">
          <div class="halfway"></div>
          <div class="center-circle"></div>
          <div class="center-dot"></div>
          <div class="box-top"></div>
          <div class="box-bottom"></div>
        </div>
        <div class="pitch-zones" id="pitchZones"></div>
      </div>
    </div>

    <div class="share-section locked" id="shareSection">
      <div class="share-hint" id="shareHint">Complete your XI to share</div>
      <button class="share-btn dl" onclick="downloadImage()">📥 Download image</button>
      <div class="share-buttons">
        <button class="share-btn x"  onclick="shareOn('x')">𝕏 Share</button>
        <button class="share-btn fb" onclick="shareOn('facebook')">Facebook</button>
        <button class="share-btn wa" onclick="shareOn('whatsapp')">WhatsApp</button>
        <button class="share-btn ig" onclick="shareOn('instagram')">Instagram</button>
      </div>
    </div>
  </div>

</div>

    { id: 19996814, name: "Thiago Almada",         photo: "https://cdn.sportmonks.com/images/soccer/players/14/19996814.png",  country: "ar" },
    { id: 37577657, name: "Giuliano Simeone",     photo: "https://cdn.sportmonks.com/images/soccer/players/25/37577657.png",  country: "ar" },
    { id: 37552296, name: "José Manuel López",    photo: "https://cdn.sportmonks.com/images/soccer/players/8/37552296.png",   country: "ar" }
  ]
};

const TAB_TO_POS = { gk:"gk", rb:"def", lb:"def", cb:"def", mid:"mid", att:"att" };
const SQUAD_TOTAL = 11;
const FORMATION_KEYS = Object.keys(FORMATIONS);

const state = {
  formation: FORMATION_KEYS[0],
  slots: [],
  active: null,
  activeTab: "gk"
};

function formationSlots() {
  const slots = [];
  FORMATIONS[state.formation].lines.forEach(line => {
    for (let i = 0; i < line.count; i++) slots.push({ pos: line.pos, spread: !!line.spread });
  });
  return slots;
}

function rebuildSlots() {
  const placed = (state.slots || []).filter(Boolean);
  state.slots = formationSlots().map(() => null);
  const order = fillOrder();
  placed.forEach((item, i) => { if (i < order.length) state.slots[order[i]] = item; });
  state.active = firstEmptySlot();
}

function totalSelected() { return state.slots.filter(Boolean).length; }
function placedGk() { return state.slots.some(s => s && s.pos === "gk"); }
function isPlaced(id) { return state.slots.some(s => s && s.player.id === id); }

function fillOrder() {
  const lines = FORMATIONS[state.formation].lines;
  const perLine = [];
  let idx = 0;
  lines.forEach(line => {
    const arr = [];
    for (let i = 0; i < line.count; i++) arr.push(idx++);
    perLine.push(arr);
  });
  const order = [];
  for (let li = perLine.length - 1; li >= 0; li--) {
    order.push(...perLine[li].slice().reverse());
  }
  return order;
}

function firstEmptySlot() {
  const order = fillOrder();
  for (const i of order) if (state.slots[i] === null) return i;
  return -1;
}

function targetSlotFor() {
  if (state.active != null && state.active >= 0 && state.slots[state.active] === null) return state.active;
  return firstEmptySlot();
}

function isSquadValid() { return totalSelected() === SQUAD_TOTAL; }

function getInitials(name) {
  const parts = name.replace(/[-']/g, " ").trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function getLastName(name) { const p = name.trim().split(/\s+/); return p[p.length - 1]; }
function getFirstName(name) { const p = name.trim().split(/\s+/); p.pop(); return p.join(" "); }
function countByCountry(c) { return state.slots.filter(s => s && s.player.country === c).length; }

function init() {
  rebuildSlots();
  renderFormationOptions();
  renderTabs();
  renderAllPanels();
  renderPitch();
  updateProgress();
  updateShareState();
}

function renderFormationOptions() {
  const el = document.getElementById("formationOptions");
  el.innerHTML = FORMATION_KEYS.map(key => {
    const cls = key === state.formation ? "active" : "";
    return `<button class="formation-btn ${cls}" onclick="changeFormation('${key}')">${FORMATIONS[key].label}</button>`;
  }).join("");
}

function changeFormation(key) {
  if (!FORMATIONS[key] || key === state.formation) return;
  state.formation = key;
  state.slots = [];
  rebuildSlots();
  renderFormationOptions();
  updateAllCards();
  renderPitch();
  updateProgress();
  updateShareState();
}

function renderTabs() {
  const el = document.getElementById("posTabs");
  el.innerHTML = POSITION_TABS.map(t => {
    const cls = t.key === state.activeTab ? "active" : "";
    const count = PLAYERS[t.key].length;
    return `<button class="pos-tab ${cls}" data-tab="${t.key}" onclick="switchTab('${t.key}')">${t.label} <span class="tab-badge" id="badge-${t.key}">${count}</span></button>`;
  }).join("");
}

function switchTab(key) {
  state.activeTab = key;
  document.querySelectorAll(".pos-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === key));
  document.querySelectorAll(".pos-panel").forEach(p => p.classList.toggle("active", p.dataset.panel === key));
}

function renderAllPanels() {
  const container = document.getElementById("posPanels");
  container.innerHTML = POSITION_TABS.map(t => {
    const cls = t.key === state.activeTab ? "active" : "";
    const cards = PLAYERS[t.key].map(p => cardHtml(t.key, p)).join("");
    return `<div class="pos-panel ${cls}" data-panel="${t.key}"><div class="player-grid">${cards}</div></div>`;
  }).join("");
  updateAllCards();
}

function cardHtml(tabKey, p) {
  const firstName = getFirstName(p.name);
  const lastName = getLastName(p.name);
  const flag = p.country === "en" ? "🏴󠁧󠁢󠁥󠁮󠁧󠁿" : "🇦🇷";
  return `<div class="player-card ${p.country}" data-tab="${tabKey}" data-id="${p.id}" data-country="${p.country}" onclick="selectPlayer('${tabKey}',${p.id})">
    <div class="avatar" style="background-image:url('${p.photo}')"></div>
    <div class="info"><div class="name">${firstName ? `<span class="first">${firstName}</span>` : ""}<span>${lastName}</span></div></div>
    <span style="font-size:.65rem;flex-shrink:0">${flag}</span>
    <div class="check">✓</div>
  </div>`;
}

function selectPlayer(tabKey, id) {
  const player = PLAYERS[tabKey].find(p => p.id === id);
  if (!player) return;

  const slotIdx = state.slots.findIndex(s => s && s.player.id === id);
  if (slotIdx >= 0) {
    state.slots[slotIdx] = null;
    state.active = slotIdx;
  } else {
    const posType = TAB_TO_POS[tabKey];
    if (posType === "gk" && placedGk()) return;
    const target = targetSlotFor();
    if (target < 0) return;
    state.slots[target] = { player, pos: posType, tabKey };
    state.active = firstEmptySlot();
  }

  updateAllCards();
  renderPitch();
  updateProgress();
  updateShareState();

  if (slotIdx < 0) autoAdvanceTab(tabKey);
}

function autoAdvanceTab(currentTab) {
  const tabKeys = POSITION_TABS.map(t => t.key);
  const curIdx = tabKeys.indexOf(currentTab);
  if (curIdx < 0 || totalSelected() >= SQUAD_TOTAL) return;
  const quota = FORMATIONS[state.formation].tabQuota || {};
  const selectedInTab = (key) => PLAYERS[key].filter(p => isPlaced(p.id)).length;
  if (selectedInTab(currentTab) < (quota[currentTab] || 1)) return;
  for (let offset = 1; offset <= tabKeys.length; offset++) {
    const idx = (curIdx + offset) % tabKeys.length;
    const key = tabKeys[idx];
    if (selectedInTab(key) >= (quota[key] || 1)) continue;
    if (key === "gk" && placedGk()) continue;
    switchTab(key);
    return;
  }
}

function updateAllCards() {
  const full = totalSelected() >= SQUAD_TOTAL;
  const gkPlaced = placedGk();

  POSITION_TABS.forEach(t => {
    const selected = PLAYERS[t.key].filter(p => isPlaced(p.id)).length;
    const badge = document.getElementById("badge-" + t.key);
    if (badge) {
      badge.textContent = selected > 0 ? selected : PLAYERS[t.key].length;
      badge.classList.toggle("empty", selected === 0);
    }
  });

  document.querySelectorAll(".player-card").forEach(card => {
    const tabKey = card.dataset.tab;
    const id = parseInt(card.dataset.id);
    const placed = isPlaced(id);
    const posType = TAB_TO_POS[tabKey];
    card.classList.toggle("selected", placed);
    card.classList.toggle("disabled", !placed && (full || (posType === "gk" && gkPlaced)));
  });

  document.getElementById("countEn").textContent = countByCountry("en");
  document.getElementById("countAr").textContent = countByCountry("ar");
}

function renderPitch() {
  const f = FORMATIONS[state.formation];
  document.getElementById("pitchFormationLabel").textContent = f.label;
  const container = document.getElementById("pitchZones");

  let idx = 0;
  container.innerHTML = f.lines.map(line => {
    let dots = "";
    for (let i = 0; i < line.count; i++) {
      const slotIndex = idx++;
      const item = state.slots[slotIndex];
      dots += item ? filledDot(item.player, item.pos, slotIndex) : emptyDot(line.pos, slotIndex);
    }
    const _g = {2:35,3:35,4:20}[line.count];
    const _gs = (_g != null && !line.spread) ? ` style="gap:${_g}px"` : "";
    return `<div class="pitch-zone ${line.pos}${line.spread ? " spread" : ""}"${_gs}>${dots}</div>`;
  }).join("");
}

function filledDot(player, pos, slotIndex) {
  const lastName = getLastName(player.name);
  const _nm = lastName.includes("-") ? lastName.replace(/-/g, "-<br>") : lastName;
  const borderColor = player.country === "en" ? "#3b82f6" : "#34d399";
  const circleStyle = player.photo
    ? `background-image:url('${player.photo}');background-size:cover;background-position:center top`
    : `background:${player.country === "en" ? "var(--en-color)" : "var(--ar-color)"}`;
  return `<div class="pitch-dot" data-pos="${pos}" onclick="clickSlot(${slotIndex})" title="Remove ${player.name}">
    <div class="dot-circle" style="${circleStyle};border-color:${borderColor}">${player.photo ? "" : getInitials(player.name)}</div>
    <div class="dot-name">${_nm}</div>
  </div>`;
}

function emptyDot(pos, slotIndex) {
  const active = state.active === slotIndex ? " active" : "";
  return `<div class="pitch-dot empty${active}" data-pos="${pos}" onclick="clickSlot(${slotIndex})">
    <div class="dot-circle">+</div>
    <div class="dot-name">—</div>
  </div>`;
}

function clickSlot(i) {
  if (state.slots[i]) { state.slots[i] = null; state.active = i; }
  else { state.active = (state.active === i) ? null : i; }
  updateAllCards();
  renderPitch();
  updateProgress();
  updateShareState();
}

function updateProgress() {
  const total = totalSelected();
  document.getElementById("totalSelected").textContent = total;
  document.getElementById("progressFill").style.width = (total / SQUAD_TOTAL * 100) + "%";
}

function updateShareState() {
  const ready = isSquadValid();
  document.getElementById("shareSection").classList.toggle("locked", !ready);
  document.getElementById("shareHint").classList.toggle("hidden", ready);
}

function resetAll() {
  state.formation = FORMATION_KEYS[0];
  state.slots = [];
  rebuildSlots();
  renderFormationOptions();
  updateAllCards();
  renderPitch();
  updateProgress();
  updateShareState();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

let _parentUrl = null;
function getShareUrl() {
  if (_parentUrl) return _parentUrl;
  try { if (window.top && window.top !== window.self && window.top.location.href) return window.top.location.href; } catch (e) { if (document.referrer) return document.referrer; }
  return window.location.href;
}
window.addEventListener('message', (e) => {
  if (e.source !== window.parent) return;
  if (e.data && (e.data.type === 'wc2026-url' || e.data.type === 'xilegende-url') && e.data.url) _parentUrl = e.data.url;
});
function setupAutoResize() {
  if (window.parent === window) return;
  let PARENT_ORIGIN = '*';
  try { if (document.referrer) PARENT_ORIGIN = new URL(document.referrer).origin; } catch (e) {}
  const postHeight = () => {
    const widget = document.getElementById('squad-widget');
    const h = widget ? Math.ceil(widget.getBoundingClientRect().bottom + window.scrollY) : Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    window.parent.postMessage({ type: 'wc2026-resize', height: h }, PARENT_ORIGIN);
    window.parent.postMessage({ type: 'xilegende-resize', height: h }, PARENT_ORIGIN);
  };
  postHeight();
  window.addEventListener('resize', postHeight);
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(postHeight).observe(document.body);
  window.parent.postMessage({ type: 'wc2026-getUrl' }, PARENT_ORIGIN);
  window.parent.postMessage({ type: 'xilegende-getUrl' }, PARENT_ORIGIN);
}

async function generateImage() {
  const pitchEl = document.getElementById("pitchContainer");
  await new Promise(r => requestAnimationFrame(r));
  const canvas = await html2canvas(pitchEl, { backgroundColor: "#f5f5f5", scale: 4, useCORS: true, allowTaint: true, logging: false, imageTimeout: 15000 });
  return new Promise((resolve, reject) => {
    canvas.toBlob(b => { if (b) resolve(b); else reject(new Error("Canvas not exportable.")); }, "image/png");
  });
}

async function downloadImage() {
  try {
    const blob = await generateImage();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "combined-xi-england-argentina-wc2026.png";
    a.click();
  } catch (e) {
    console.error("html2canvas error:", e);
    alert(location.protocol === "file:" ? "Local capture blocked on file://. Use a local server." : "Error: " + (e.message || e));
  }
}

function shareOn(platform) {
  const text = encodeURIComponent("Here's my Combined XI: England × Argentina for the 2026 World Cup! What's your dream mix? Build yours here:");
  const url = encodeURIComponent(getShareUrl());
  const urls = {
    x: `https://twitter.com/intent/tweet?text=${text}&url=${url}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`,
    whatsapp: `https://wa.me/?text=${text}%20${url}`
  };
  if (platform === "instagram") { downloadImage(); alert("Image downloaded! Share it directly on Instagram."); return; }
  if (urls[platform]) window.open(urls[platform], "_blank", "width=600,height=400");
}

init();
setupAutoResize();
</script>
